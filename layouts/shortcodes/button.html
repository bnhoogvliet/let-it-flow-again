<!-- layouts/shortcodes/button.html -->

<style>
  .scheduling-button {
    display: inline-block;
    background-color: #BFA78E; /* Tell the therapist they can change this hex color */
    color: #ffffff !important;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: bold;
    text-decoration: none !important;

    margin: 15px 0;
